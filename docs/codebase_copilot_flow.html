<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">

  <title>Codebase Copilot 流程图</title>
  <style>
    :root {
      --bg: #eef4fb;
      --page: #ffffff;
      --ink: #1b2433;
      --muted: #6c7a91;
      --line: #8ea3c5;
      --pink: #f16f8d;
      --teal: #51d2c1;
      --blue: #5f8ff6;
      --green: #59c78d;
      --gold: #e5b44a;
      --violet: #9878ef;
      --shadow: 0 22px 60px rgba(30, 44, 79, 0.14);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(95, 143, 246, 0.12), transparent 24%),
        radial-gradient(circle at top right, rgba(81, 210, 193, 0.10), transparent 26%),
        linear-gradient(180deg, #f7faff 0%, #edf3fb 100%);
    }

    .shell { padding: 28px; }

    .page {
      max-width: 1840px;
      margin: 0 auto;
      background: var(--page);
      border: 1px solid rgba(120, 146, 191, 0.18);
      border-radius: 26px;
      overflow: hidden;
      box-shadow: var(--shadow);
    }

    .header {
      padding: 28px 34px 20px;
      border-bottom: 1px solid rgba(130, 154, 195, 0.18);
      background: linear-gradient(180deg, #ffffff 0%, #fbfdff 100%);
    }

    h1 {
      margin: 0;
      font-size: 34px;
      line-height: 1.08;
      letter-spacing: -0.03em;
    }

    .sub {
      margin-top: 10px;
      max-width: 980px;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.6;
    }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 14px;
    }

    .tag {
      padding: 8px 14px;
      border-radius: 999px;
      border: 1px solid rgba(111, 137, 181, 0.18);
      background: #f7f9fd;
      color: #3f5270;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .canvas-wrap {
      overflow-x: auto;
      padding: 18px 20px 26px;
    }

    svg {
      width: 1800px;
      height: 1420px;
      display: block;
      margin: 0 auto;
    }

    .footer {
      padding: 0 34px 28px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
    }
  </style>
</head>
